<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060d"/>
      <stop offset="50%" stop-color="#0d0f24"/>
      <stop offset="100%" stop-color="#120826"/>
    </linearGradient>

    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3ffcff"/>
      <stop offset="50%" stop-color="#ff2bd6"/>
      <stop offset="100%" stop-color="#8a2bff"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="520" fill="url(#bg)"/>

  <g opacity="0.20">
    <path d="M0 120 H900" stroke="#3ffcff" stroke-width="1"/>
    <path d="M0 180 H900" stroke="#ff2bd6" stroke-width="1"/>
    <path d="M0 240 H900" stroke="#3ffcff" stroke-width="1"/>
    <path d="M0 300 H900" stroke="#8a2bff" stroke-width="1"/>
    <path d="M0 360 H900" stroke="#ff2bd6" stroke-width="1"/>
  </g>

  <g filter="url(#glow)">
    <polygon points="110,85 770,85 840,155 840,365 770,435 110,435 60,365 60,155"
      fill="none" stroke="url(#neon)" stroke-width="6"/>
  </g>

  <text x="120" y="220" font-family="monospace" font-size="50" fill="#d8faff" font-weight="bold">
    did.ai.in
  </text>

  <text x="120" y="280" font-family="monospace" font-size="20" fill="#3ffcff">
    placeholder landing endpoint
  </text>

  <text x="120" y="340" font-family="monospace" font-size="18" fill="#ff2bd6">
    identity.nvo987.us
  </text>

  <text x="120" y="395" font-family="monospace" font-size="14" fill="#8a2bff">
    static deployment / github pages
  </text>
</svg>
